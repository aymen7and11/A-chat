<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#0d0e22">
<title>A·chat — a room for friends</title>
<meta name="description" content="A·chat — a calm, glass-walled room for a conversation between friends.">
<link rel="icon" href="data:,">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<!-- ============================================================
     FONTS
     Three roles, used on purpose:
     - Sora   → display face (logo + the "what's your name" headline). Used sparingly.
     - Inter  → body face (everything you actually read: messages, labels).
     - Space Mono → utility face (timestamps), it gives the chat a quiet
       "live readout" feel, like a HUD clock, without shouting for attention.
============================================================ -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<!-- ============================================================
     FIREBASE SDK  (disabled by default)
     ============================================================
     A-chat ships fully working out of the box using a small local
     "demo backend" (see the FIREBASE HOOKS section near the bottom
     of the <script>). That demo backend stores messages in
     localStorage and syncs them live across browser tabs with
     BroadcastChannel, so you can open two tabs and watch messages
     appear in both — no server required.

     To switch to a real, shared Firebase Realtime Database:

     1. Create a project at https://console.firebase.google.com
        and enable "Realtime Database" for it.
     2. Uncomment the two <script> tags directly below.
     3. Scroll to the "FIREBASE INITIALIZATION" section inside the
        main <script> at the bottom of this file, paste your config
        object there, and uncomment the firebase.initializeApp(...) line.
     4. Inside the "FIREBASE HOOKS" section, comment out the two
        LocalDemoBackend.* lines and uncomment the two db.ref(...)
        lines right below them. That's the entire swap.
-->
<!-- <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script> -->
<!-- <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script> -->

<style>

  /* ============================================================
     1. DESIGN TOKENS
     ============================================================
     Every color, radius, easing curve and font in this file is
     pulled from these custom properties. Change a value here and
     the whole room re-tunes itself. The palette is a "dusk through
     frosted glass" idea: a near-black indigo base lit from behind
     by two soft glows — a cool periwinkle and a warm amber — the
     same two colors that show up in every accent, avatar and the
     send button's liquid core, so nothing feels like a random
     rainbow.
  ============================================================ */
  :root{
    /* base canvas */
    --bg-deep:   #0a0b1f;
    --bg-base:   #11122c;

    /* ambient glow colors (used by the drifting background blobs) */
    --glow-violet: #6c5ce0;
    --glow-teal:   #2bb3a3;
    --glow-amber:  #e8a86c;
    --glow-rose:   #d98bb0;

    /* glass surfaces */
    --glass-fill:        rgba(255,255,255,0.055);
    --glass-fill-strong: rgba(255,255,255,0.09);
    --glass-border:      rgba(255,255,255,0.16);
    --glass-border-soft: rgba(255,255,255,0.09);
    --glass-highlight:   rgba(255,255,255,0.5);

    /* text */
    --text-primary:   #f5f3fb;
    --text-secondary: rgba(245,243,251,0.62);
    --text-tertiary:  rgba(245,243,251,0.38);

    /* the two-tone accent system */
    --accent:        #9b8cff;
    --accent-strong: #bcb0ff;
    --accent-amber:  #f0b585;

    /* shadows */
    --shadow-soft: 0 1px 2px rgba(4,5,16,0.4);
    --shadow-lift: 0 18px 40px -12px rgba(4,5,18,0.55);
    --shadow-deep: 0 30px 70px -20px rgba(2,3,14,0.65);

    /* shape */
    --radius-xl: 30px;
    --radius-lg: 22px;
    --radius-md: 16px;
    --radius-sm: 11px;

    /* motion — these cubic-beziers all overshoot slightly before
       settling, approximating a spring at low cost for the many
       small CSS-driven transitions (hover, focus, panel intro).
       The handful of marquee interactions (message entrance, the
       send button, the send orb) instead use a real spring solved
       frame-by-frame in JS — see the Spring class. */
    --ease-spring:  cubic-bezier(0.34, 1.56, 0.64, 1);
    --ease-out:     cubic-bezier(0.22, 1, 0.36, 1);
    --ease-in-out:  cubic-bezier(0.65, 0, 0.35, 1);

    --font-display: 'Sora', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    --font-body:    'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    --font-mono:    'Space Mono', ui-monospace, 'SF Mono', Menlo, monospace;
  }

  /* ============================================================
     2. RESET & BASE
     ============================================================ */
  *, *::before, *::after{ box-sizing: border-box; }
  html, body{ height: 100%; }
  body{
    margin: 0;
    min-height: 100vh;
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow: hidden; /* the app shell manages its own internal scrolling */
  }
  img, svg{ display:block; max-width:100%; }
  button{ font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
  input, textarea{ font: inherit; color: inherit; background: none; border: none; }
  ::selection{ background: rgba(155,140,255,0.35); }

  /* a visible, deliberate focus ring everywhere — replaces the
     default outline rather than removing it. */
  :focus-visible{
    outline: none;
    box-shadow: 0 0 0 3px rgba(155,140,255,0.55), 0 0 0 1px rgba(255,255,255,0.4) inset;
    border-radius: var(--radius-sm);
  }

  @media (prefers-reduced-motion: reduce){
    *, *::before, *::after{
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
      scroll-behavior: auto !important;
    }
  }

  /* ============================================================
     3. AMBIENT BACKGROUND
     ============================================================
     A fixed layer behind everything: three huge, heavily-blurred
     color blobs drifting on slow, independent loops, plus a thin
     grain layer to keep large flat blur from looking sterile, plus
     a handful of soft floating particles. None of this ever
     intercepts clicks (pointer-events: none all the way down).
  ============================================================ */
  .ambient{
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    pointer-events: none;
    background:
      radial-gradient(circle at 50% 0%, rgba(255,255,255,0.04), transparent 60%),
      var(--bg-deep);
  }
  .blob{
    position: absolute;
    border-radius: 50%;
    filter: blur(70px);
    opacity: 0.55;
    will-change: transform;
    transform: translate(calc(var(--mx, 0) * 6px), calc(var(--my, 0) * 6px));
  }
  .blob-a{
    width: 56vmax; height: 56vmax;
    left: -18vmax; top: -22vmax;
    background: radial-gradient(circle, var(--glow-violet), transparent 70%);
    animation: drift-a 38s ease-in-out infinite;
  }
  .blob-b{
    width: 50vmax; height: 50vmax;
    right: -16vmax; top: 8vmax;
    background: radial-gradient(circle, var(--glow-teal), transparent 70%);
    animation: drift-b 44s ease-in-out infinite;
  }
  .blob-c{
    width: 48vmax; height: 48vmax;
    left: 18vmax; bottom: -26vmax;
    background: radial-gradient(circle, var(--glow-amber), transparent 72%);
    animation: drift-c 50s ease-in-out infinite;
  }
  @keyframes drift-a{
    0%, 100%{ transform: translate(0, 0) scale(1); }
    33%{ transform: translate(6vmax, 4vmax) scale(1.08); }
    66%{ transform: translate(-3vmax, 7vmax) scale(0.96); }
  }
  @keyframes drift-b{
    0%, 100%{ transform: translate(0, 0) scale(1); }
    40%{ transform: translate(-7vmax, 5vmax) scale(1.06); }
    70%{ transform: translate(-2vmax, -6vmax) scale(0.97); }
  }
  @keyframes drift-c{
    0%, 100%{ transform: translate(0, 0) scale(1); }
    30%{ transform: translate(5vmax, -5vmax) scale(1.05); }
    65%{ transform: translate(8vmax, 2vmax) scale(0.98); }
  }
  .grain{
    position: absolute; inset: -10%;
    background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 3px 3px;
    opacity: 0.35;
    mix-blend-mode: overlay;
  }
  .particles{ position: absolute; inset: 0; }
  .particle{
    position: absolute;
    bottom: -4%;
    width: var(--size, 4px); height: var(--size, 4px);
    border-radius: 50%;
    background: rgba(255,255,255,0.55);
    opacity: 0;
    animation: float-up var(--dur, 22s) linear var(--delay, 0s) infinite;
  }
  @keyframes float-up{
    0%{   transform: translate(0, 0); opacity: 0; }
    8%{   opacity: var(--peak, 0.5); }
    92%{  opacity: var(--peak, 0.5); }
    100%{ transform: translate(var(--drift, 30px), -108vh); opacity: 0; }
  }

  /* ============================================================
     4. GLASS PANEL — shared look
     ============================================================
     Every floating surface (the name card, the top bar, message
     cards, the composer) shares this recipe: a translucent fill,
     backdrop blur, a hairline border that's brighter on top than
     bottom (so light reads as coming from above), an inner glow,
     and a soft outer shadow that does the "floating" work.
  ============================================================ */
  .glass{
    position: relative;
    background: var(--glass-fill);
    -webkit-backdrop-filter: blur(28px) saturate(140%);
    backdrop-filter: blur(28px) saturate(140%);
    border: 1px solid var(--glass-border-soft);
    border-top-color: var(--glass-border);
    box-shadow:
      var(--shadow-lift),
      inset 0 1px 0 rgba(255,255,255,0.18),
      inset 0 -1px 0 rgba(255,255,255,0.04);
  }
  /* a slow diagonal sheen that sweeps across a panel every so often —
     this is the "moving highlight / beautiful reflection" the brief
     asks for, implemented as a single lightweight pseudo-element. */
  .glass::after{
    content: "";
    position: absolute; inset: 0;
    border-radius: inherit;
    background: linear-gradient(115deg, transparent 35%, rgba(255,255,255,0.16) 50%, transparent 65%);
    background-size: 240% 240%;
    background-position: -120% -120%;
    opacity: 0;
    pointer-events: none;
    animation: sheen 9s ease-in-out infinite;
  }
  @keyframes sheen{
    0%   { background-position: -120% -120%; opacity: 0; }
    8%   { opacity: 0.7; }
    32%  { background-position: 120% 120%; opacity: 0; }
    100% { background-position: 120% 120%; opacity: 0; }
  }
  /* a soft radial highlight that follows the cursor, only on panels
     marked .glass-reactive (set via JS pointermove → CSS vars). This
     is the literal "glass reacts to the cursor" requirement. */
  .glass-reactive::before{
    content: "";
    position: absolute; inset: 0;
    border-radius: inherit;
    pointer-events: none;
    opacity: var(--glow-opacity, 0);
    background: radial-gradient(220px circle at var(--gx, 50%) var(--gy, 50%), rgba(255,255,255,0.18), transparent 65%);
    transition: opacity 0.4s var(--ease-out);
  }

  /* ============================================================
     5. SPLASH / LOADER
     ============================================================
     A brief, orchestrated entrance: the brand orb springs in,
     holds, then the whole thing dissolves to reveal the room.
     This is the one moment that's allowed a little ceremony.
  ============================================================ */
  .splash{
    position: fixed; inset: 0; z-index: 50;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 18px;
    background: var(--bg-deep);
    transition: opacity 0.6s var(--ease-out), filter 0.6s var(--ease-out);
  }
  .splash-orb{
    width: 64px; height: 64px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, var(--accent), var(--accent-amber), var(--glow-rose), var(--accent));
    filter: blur(0.2px) saturate(140%);
    box-shadow: 0 0 50px rgba(155,140,255,0.45);
    animation: splash-spin 2.4s linear infinite, splash-in 0.7s var(--ease-spring) both;
  }
  @keyframes splash-spin{ to{ transform: rotate(360deg); } }
  @keyframes splash-in{ from{ transform: scale(0.4); opacity: 0; } to{ transform: scale(1); opacity: 1; } }
  .splash-word{
    font-family: var(--font-display);
    font-weight: 700;
    letter-spacing: 0.02em;
    color: var(--text-secondary);
    font-size: 14px;
    text-transform: uppercase;
    animation: splash-in 0.7s var(--ease-spring) 0.1s both;
  }
  .splash.is-leaving{ opacity: 0; filter: blur(8px); pointer-events: none; }

  /* ============================================================
     6. NAME VEIL  (the "what's your name" glass card)
     ============================================================ */
  .name-veil{
    position: fixed; inset: 0; z-index: 40;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    background: rgba(6,7,18,0.35);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s var(--ease-out);
  }
  .name-veil.is-visible{ opacity: 1; pointer-events: auto; }
  .name-card{
    width: 100%; max-width: 420px;
    border-radius: var(--radius-xl);
    padding: 44px 36px 36px;
    text-align: center;
    transform: scale(0.9) translateY(18px);
    opacity: 0;
    transition: transform 0.55s var(--ease-spring), opacity 0.45s var(--ease-out);
  }
  .name-veil.is-visible .name-card{ transform: scale(1) translateY(0); opacity: 1; }
  .name-card-orb{
    width: 46px; height: 46px;
    margin: 0 auto 22px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, var(--accent), var(--accent-amber), var(--glow-rose), var(--accent));
    box-shadow: 0 0 36px rgba(155,140,255,0.4);
    animation: splash-spin 3s linear infinite;
  }
  .name-title{
    font-family: var(--font-display);
    font-size: 24px;
    font-weight: 700;
    margin: 0 0 10px;
    letter-spacing: -0.01em;
  }
  .name-sub{
    margin: 0 0 26px;
    color: var(--text-secondary);
    font-size: 14.5px;
    line-height: 1.5;
  }
  .name-input{
    width: 100%;
    padding: 16px 20px;
    border-radius: var(--radius-lg);
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--glass-border-soft);
    text-align: center;
    font-size: 16px;
    font-weight: 500;
    color: var(--text-primary);
    transition: transform 0.3s var(--ease-spring), background 0.3s var(--ease-out), border-color 0.3s var(--ease-out);
  }
  .name-input::placeholder{ color: var(--text-tertiary); }
  .name-input:focus{
    transform: scale(1.015);
    background: rgba(255,255,255,0.09);
    border-color: rgba(255,255,255,0.28);
  }
  .name-submit{
    width: 100%;
    margin-top: 16px;
    padding: 15px 20px;
    border-radius: var(--radius-lg);
    background: linear-gradient(135deg, var(--accent), #7c6cf0);
    color: #100f24;
    font-weight: 700;
    font-size: 15px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    box-shadow: 0 14px 30px -10px rgba(155,140,255,0.55);
    transition: transform 0.25s var(--ease-spring), box-shadow 0.25s var(--ease-out), filter 0.25s var(--ease-out);
  }
  .name-submit:hover{ filter: brightness(1.08); transform: translateY(-1px); }
  .name-submit:active{ transform: scale(0.96); }
  .name-submit svg{ width: 16px; height: 16px; }
  .name-error{
    margin-top: 12px;
    font-size: 13px;
    color: var(--accent-amber);
    min-height: 16px;
  }

  /* ============================================================
     7. APP SHELL
     ============================================================ */
  .app{
    position: relative;
    z-index: 1;
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
    gap: 14px;
    opacity: 0;
  }
  .app.is-ready{ opacity: 1; transition: opacity 0.4s var(--ease-out); }

  /* -- top bar -------------------------------------------------- */
  .topbar{
    flex: 0 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
    padding: 12px 10px 12px 18px;
    border-radius: var(--radius-xl);
    transform: translateY(-14px);
    opacity: 0;
  }
  .app.is-ready .topbar{ animation: panel-in 0.6s var(--ease-spring) 0.05s both; }

  .brand{ display: flex; align-items: center; gap: 10px; min-width: 0; }
  .brand-orb{
    width: 26px; height: 26px; flex: 0 0 auto;
    border-radius: 50%;
    background: conic-gradient(from 0deg, var(--accent), var(--accent-amber), var(--glow-rose), var(--accent));
    box-shadow: 0 0 18px rgba(155,140,255,0.5);
    animation: splash-spin 4s linear infinite;
  }
  .brand-word{
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.01em;
    white-space: nowrap;
  }
  .brand-status{
    display: flex; align-items: center; gap: 6px;
    font-size: 11.5px;
    color: var(--text-tertiary);
    margin-left: 6px;
    padding-left: 10px;
    border-left: 1px solid var(--glass-border-soft);
    white-space: nowrap;
  }
  .brand-status-dot{
    width: 6px; height: 6px; border-radius: 50%;
    background: #6ee7b7;
    box-shadow: 0 0 8px #6ee7b7;
    animation: pulse-dot 2.2s ease-in-out infinite;
  }
  @keyframes pulse-dot{ 0%,100%{ opacity: 1; transform: scale(1);} 50%{ opacity: 0.5; transform: scale(0.8);} }

  .user-pill{
    display: flex; align-items: center; gap: 9px;
    padding: 7px 14px 7px 7px;
    border-radius: 999px;
    background: var(--glass-fill-strong);
    border: 1px solid var(--glass-border-soft);
    transition: transform 0.25s var(--ease-spring), background 0.25s var(--ease-out);
  }
  .user-pill:hover{ background: rgba(255,255,255,0.13); transform: translateY(-1px); }
  .user-pill:active{ transform: scale(0.96); }
  .user-avatar{
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 12.5px;
    color: rgba(10,10,20,0.75);
    flex: 0 0 auto;
  }
  .user-name{
    font-size: 13.5px; font-weight: 600;
    max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .user-caret{ font-size: 11px; color: var(--text-tertiary); }

  /* -- stage / chat log ------------------------------------------ */
  .stage{
    position: relative;
    flex: 1 1 auto;
    min-height: 0;
    border-radius: var(--radius-xl);
    overflow: hidden;
  }
  .chat-log{
    position: relative;
    height: 100%;
    overflow-y: auto;
    overscroll-behavior: contain;
    scroll-behavior: smooth;
    padding: 30px 18px 26px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  /* beautiful scrollbar (webkit) */
  .chat-log::-webkit-scrollbar{ width: 8px; }
  .chat-log::-webkit-scrollbar-track{ background: transparent; }
  .chat-log::-webkit-scrollbar-thumb{
    background: linear-gradient(180deg, rgba(155,140,255,0.55), rgba(240,181,133,0.4));
    border-radius: 999px;
    border: 2px solid transparent;
  }
  .chat-log{ scrollbar-width: thin; scrollbar-color: rgba(155,140,255,0.5) transparent; }

  .scroll-fade{
    position: absolute; left: 0; right: 0; height: 46px;
    pointer-events: none; z-index: 2;
  }
  .scroll-fade-top{ top: 0; background: linear-gradient(to bottom, var(--bg-deep) 0%, transparent 100%); opacity: 0.5; }

  /* empty state */
  .empty-state{
    margin: auto;
    text-align: center;
    color: var(--text-tertiary);
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    padding: 30px;
  }
  .empty-orb{
    width: 52px; height: 52px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.25), transparent 60%), var(--glass-fill-strong);
    border: 1px solid var(--glass-border-soft);
    animation: empty-breathe 3.2s ease-in-out infinite;
  }
  @keyframes empty-breathe{ 0%,100%{ transform: scale(1); opacity: 0.85; } 50%{ transform: scale(1.06); opacity: 1; } }
  .empty-state h2{ margin: 0; font-family: var(--font-display); font-size: 17px; color: var(--text-secondary); font-weight: 600; }
  .empty-state p{ margin: 0; font-size: 13.5px; max-width: 260px; line-height: 1.5; }

  /* jump to latest */
  .jump-latest{
    position: absolute;
    bottom: 18px; left: 50%;
    transform: translate(-50%, 12px);
    display: flex; align-items: center; gap: 6px;
    padding: 9px 16px;
    border-radius: 999px;
    background: var(--glass-fill-strong);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(20px);
    font-size: 12.5px; font-weight: 600;
    color: var(--text-primary);
    box-shadow: var(--shadow-lift);
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s var(--ease-out), transform 0.3s var(--ease-spring);
    z-index: 3;
  }
  .jump-latest.is-visible{ opacity: 1; transform: translate(-50%, 0); pointer-events: auto; }
  .jump-latest svg{ width: 13px; height: 13px; }

  /* -- message cards ---------------------------------------------- */
  .message-row{
    display: flex;
    gap: 10px;
    max-width: min(640px, 86%);
    margin: 11px 0;
    align-self: flex-start;
  }
  .message-row.is-own{ align-self: flex-end; flex-direction: row-reverse; }
  .message-row.is-grouped{ margin-top: -5px; }
  .message-row.is-grouped .message-avatar{ visibility: hidden; }

  .message-avatar{
    width: 32px; height: 32px; border-radius: 50%;
    flex: 0 0 auto;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 12.5px;
    color: rgba(10,10,20,0.75);
    margin-top: 2px;
  }
  .message-body{ display: flex; flex-direction: column; min-width: 0; }
  .message-meta{
    display: flex; align-items: baseline; gap: 8px;
    margin-bottom: 5px;
    padding: 0 4px;
  }
  .is-own .message-meta{ flex-direction: row-reverse; }
  .is-grouped .message-meta{ display: none; }
  .message-name{ font-size: 12.5px; font-weight: 700; color: var(--text-secondary); }
  .message-time{
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--text-tertiary);
    letter-spacing: -0.02em;
  }
  .message-card{
    position: relative;
    padding: 11px 15px;
    border-radius: var(--radius-md);
    background: var(--glass-fill);
    border: 1px solid var(--glass-border-soft);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
    backdrop-filter: blur(18px) saturate(140%);
    box-shadow: var(--shadow-soft), inset 0 1px 0 rgba(255,255,255,0.12);
    font-size: 14.5px;
    line-height: 1.45;
    color: var(--text-primary);
    word-wrap: break-word;
    overflow-wrap: anywhere;
    white-space: pre-wrap;
  }
  .is-own .message-card{
    background: linear-gradient(155deg, rgba(155,140,255,0.28), rgba(155,140,255,0.12));
    border-color: rgba(188,176,255,0.3);
  }
  .message-row.is-grouped .message-card{ border-top-left-radius: var(--radius-sm); }
  .message-row.is-grouped.is-own .message-card{ border-top-right-radius: var(--radius-sm); border-top-left-radius: var(--radius-md); }
  .message-row.is-grouped:not(.is-own) .message-card{ border-top-left-radius: var(--radius-sm); }
  .message-row:not(.is-grouped) .message-time-inline{ display: none; }
  .message-time-inline{
    display: inline-block;

  }

  /* -- composer ----------------------------------------------------- */
  .composer{ flex: 0 0 auto; }
  .composer-bar{
    display: flex; align-items: flex-end; gap: 10px;
    padding: 10px 10px 10px 20px;

  }
  .app.is-ready .composer-bar{ animation: panel-in 0.6s var(--ease-spring) 0.12s both; }
  @keyframes panel-in{ from{ transform: translateY(var(--from-y, 14px)); opacity: 0; } to{ transform: translateY(0); opacity: 1; } }

  .composer-input{
    flex: 1 1 auto;
    resize: none;
    max-height: 140px;
    min-height: 24px;
    padding: 9px 4px;
    font-size: 15px;

  }
  .composer-input::placeholder{ color: var(--text-tertiary); }

  .send-orb{
    position: relative;
    width: 46px; height: 46px; flex: 0 0 auto;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;

  }
  .send-orb-core{
    position: absolute; inset: 0;
    background: conic-gradient(from 0deg, var(--accent), var(--accent-amber), var(--glow-rose), var(--accent));
    animation: splash-spin 5s linear infinite;
  }
  .send-orb-core::after{
    content: "";
    position: absolute; inset: 0;
    background: radial-gradient(circle at 32% 28%, rgba(255,255,255,0.55), transparent 55%);
  }
  .send-orb::before{
    content: "";
    position: absolute; inset: 0;
    border-radius: 50%;
    background: rgba(0,0,0,0.18);
    transform: scale(0);
    transition: transform 0.5s var(--ease-out);
    z-index: 1;
  }
  .send-orb.is-rippling::before{ transform: scale(1); transition: none; animation: ripple-out 0.55s var(--ease-out); }
  @keyframes ripple-out{ from{ transform: scale(0); opacity: 0.6; } to{ transform: scale(1); opacity: 0; } }
  .send-icon{
    position: relative; z-index: 2;
    width: 17px; height: 17px;
    color: rgba(12,10,24,0.85);
  }
  .send-orb:disabled{ opacity: 0.45; box-shadow: none; }

  /* ============================================================
     8. RESPONSIVE
     ============================================================ */
  @media (max-width: 720px){
    .app{ padding: max(10px, env(safe-area-inset-top)) max(8px, env(safe-area-inset-right)) max(10px, env(safe-area-inset-bottom)) max(8px, env(safe-area-inset-left)); gap: 10px; }
    .topbar{ border-radius: var(--radius-lg); padding: 10px 8px 10px 14px; }
    .stage{ border-radius: var(--radius-lg); }
    .chat-log{ padding: 20px 12px 18px; }
    .composer-bar{ border-radius: 24px; padding: 8px 8px 8px 16px; }
    .message-row{ max-width: 92%; }
    .brand-status{ display: none; }

  }
  @media (max-width: 420px){
    .name-card{ padding: 34px 22px 28px; }
    .send-orb{ width: 42px; height: 42px; }
  }
  @media (orientation: landscape) and (max-height: 480px){
    .empty-state{ gap: 8px; }
    .name-card{ padding: 24px 28px; }
  }

</style>

<body>

  <!-- ============================================================
       AMBIENT BACKGROUND LAYER
       Purely decorative (aria-hidden). Three blurred color blobs,
       a grain overlay, and a sprinkling of floating particles
       generated in JS so the count/speed can respect
       prefers-reduced-motion.
  ============================================================ -->
  <div class="ambient" aria-hidden="true">
    <div class="blob blob-a"></div>
    <div class="blob blob-b"></div>
    <div class="blob blob-c"></div>
    <div class="grain"></div>
    <div class="particles" id="particles"></div>
  </div>

  <!-- ============================================================
       SPLASH SCREEN
  ============================================================ -->
  <div class="splash" id="splash" aria-hidden="true">
    <div class="splash-orb"></div>
    <p class="splash-word">A·chat</p>
  </div>

  <!-- ============================================================
       NAME VEIL — first-run "what's your name" card.
       Re-opened later (pre-filled) when the user taps their pill.
  ============================================================ -->
  <div class="name-veil" id="nameVeil" role="dialog" aria-modal="true" aria-labelledby="nameTitle">
    <form class="name-card glass" id="nameForm" novalidate>
      <div class="name-card-orb" aria-hidden="true"></div>
      <h1 class="name-title" id="nameTitle">What should we call you?</h1>
      <p class="name-sub">Pick a name for this room. Everyone here will see it next to your messages.</p>
      <label class="visually-hidden" for="nameInput">Your name</label>
      <input
        class="name-input"
        id="nameInput"
        type="text"
        maxlength="24"
        autocomplete="off"
        autocapitalize="words"
        placeholder="Type your name"
        aria-describedby="nameError"
      >
      <button class="name-submit" type="submit">
        <span id="nameSubmitLabel">Enter the room</span>
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <p class="name-error" id="nameError" role="alert"></p>
    </form>
  </div>

  <!-- ============================================================
       APP SHELL
  ============================================================ -->
  <div class="app" id="app">

    <!-- TOP BAR -->
    <header class="topbar glass glass-reactive">
      <div class="brand">
        <span class="brand-orb" aria-hidden="true"></span>
        <span class="brand-word">A·chat</span>
        <span class="brand-status">
          <span class="brand-status-dot" aria-hidden="true"></span>
          <span id="backendLabel">live room</span>
        </span>
      </div>
      <button class="user-pill" id="userPill" type="button" aria-haspopup="dialog" aria-label="Edit your name">
        <span class="user-avatar" id="userAvatar">?</span>
        <span class="user-name" id="userNameLabel">Friend</span>
        <span class="user-caret" aria-hidden="true">⌄</span>
      </button>
    </header>

    <!-- CHAT STAGE -->
    <main class="stage glass">
      <div class="chat-log" id="chatLog" role="log" aria-live="polite" aria-relevant="additions" aria-label="Conversation">
        <div class="empty-state" id="emptyState">
          <div class="empty-orb" aria-hidden="true"></div>
          <h2>It's quiet in here</h2>
          <p>This room is empty until someone sends the first message. Say hello.</p>
        </div>
      </div>
      <div class="scroll-fade scroll-fade-top" aria-hidden="true"></div>
      <button class="jump-latest" id="jumpLatest" type="button">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 4v14m0 0l-6-6m6 6l6-6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>New messages</span>
      </button>
    </main>

    <!-- COMPOSER -->
    <footer class="composer">
      <form class="composer-bar glass glass-reactive" id="composerForm">
        <label class="visually-hidden" for="messageInput">Message</label>
        <textarea
          class="composer-input"
          id="messageInput"
          rows="1"
          maxlength="1000"
          aria-label="Message"
        ></textarea>
        <button class="send-orb" id="sendButton" type="submit" aria-label="Send message" disabled>
          <span class="send-orb-core" aria-hidden="true"></span>
          <svg class="send-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </form>
    </footer>

  </div>

  <style>
    .visually-hidden{
      position: absolute; width: 1px; height: 1px;
      overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap;
    }
  </style>

  <script>
  /* ================================================================
     A·CHAT — APPLICATION SCRIPT
     ================================================================
     Organized top to bottom as:
       1. Configuration & constants
       2. State
       3. DOM references
       4. Spring physics engine        (real per-frame physics)
       5. Utilities
       6. Username management
       7. Avatar colors
       8. Ambient background (particles + cursor parallax)
       9. Chat rendering
       10. Firebase hooks               (the part you'll customize)
       11. Message sending
       12. Composer behaviour (autosize, placeholder typewriter)
       13. Event listeners
       14. Boot sequence (splash → name veil / chat)
     Read it top to bottom once and the whole app should make sense.
  ================================================================ */

  // ==================================================================
  // 1. CONFIGURATION & CONSTANTS
  // ==================================================================
  // Where things are stored, and the few numbers that tune the feel
  // of the app. Tweak these freely — nothing else in the file needs
  // to change when you do.
  const CONFIG = {
    // localStorage keys
    storageKeyUsername: 'achat_username',
    storageKeyDemoMessages: 'achat_demo_messages', // only used by the LOCAL DEMO backend, see section 10
    // how many messages to keep around in the demo backend / on screen
    maxHistory: 200,
    // messages from the same person within this many minutes are
    // visually "grouped" (avatar/name collapse) like a real chat app
    groupWindowMinutes: 5,
    // how close to the bottom (in px) counts as "already at the bottom",
    // used to decide whether to auto-scroll on a new message
    autoScrollThreshold: 120,
    // minimum time the splash screen stays up, so it never flashes
    splashMinMs: 850,
  };

  // The example phrases the composer's placeholder slowly types and
  // erases when the input is empty and unfocused (section 12).
  const PLACEHOLDER_PHRASES = [
    'Say something…',
    'Share a thought…',
    "What's on your mind?",
    'Send the first message…',
  ];

  // ==================================================================
  // 2. STATE
  // ==================================================================
  // Plain mutable variables. This app is small enough that a single
  // shared state object (rather than a framework) keeps things easy
  // to follow — every place that reads or writes `state` is named.
  const state = {
    username: null,            // the current display name, once chosen
    lastRenderedUsername: null,// used to decide whether to "group" the next message
    lastRenderedTime: 0,       // ms timestamp of the last rendered message
    isUserNearBottom: true,    // whether autoscroll should kick in
    unseenCount: 0,            // how many messages arrived while scrolled up
  };

  // ==================================================================
  // 3. DOM REFERENCES
  // ==================================================================
  const splashEl        = document.getElementById('splash');
  const appEl            = document.getElementById('app');
  const nameVeilEl       = document.getElementById('nameVeil');
  const nameFormEl       = document.getElementById('nameForm');
  const nameInputEl      = document.getElementById('nameInput');
  const nameErrorEl      = document.getElementById('nameError');
  const nameSubmitLabel  = document.getElementById('nameSubmitLabel');

  const userPillEl       = document.getElementById('userPill');
  const userAvatarEl     = document.getElementById('userAvatar');
  const userNameLabelEl  = document.getElementById('userNameLabel');
  const backendLabelEl   = document.getElementById('backendLabel');

  const chatLogEl        = document.getElementById('chatLog');
  const emptyStateEl     = document.getElementById('emptyState');
  const jumpLatestEl     = document.getElementById('jumpLatest');

  const composerFormEl   = document.getElementById('composerForm');
  const messageInputEl   = document.getElementById('messageInput');
  const sendButtonEl     = document.getElementById('sendButton');

  const particlesHostEl  = document.getElementById('particles');

  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // ==================================================================
  // 4. SPRING PHYSICS ENGINE
  // ==================================================================
  // A tiny, real spring simulation (mass / stiffness / damping)
  // solved one frame at a time with requestAnimationFrame. This is
  // what gives the message cards and the send button genuine
  // overshoot-then-settle motion, rather than a canned CSS ease.
  //
  // Usage:
  //   const spring = new Spring(0, { stiffness: 220, damping: 18 });
  //   spring.to(1, (value) => { el.style.transform = `scale(${value})`; });
  //
  // Calling .to() again before the previous animation settles just
  // redirects it — exactly how real momentum behaves when you flick
  // something mid-motion.
  class Spring {
    constructor(initialValue = 0, { stiffness = 210, damping = 20, mass = 1 } = {}) {
      this.value = initialValue;
      this.target = initialValue;
      this.velocity = 0;
      this.stiffness = stiffness;
      this.damping = damping;
      this.mass = mass;
      this._onUpdate = null;
      this._rafId = null;
      this._step = this._step.bind(this);
    }
    to(target, onUpdate) {
      this.target = target;
      if (onUpdate) this._onUpdate = onUpdate;
      if (this._rafId === null) {
        this._rafId = requestAnimationFrame(this._step);
      }
    }
    _step() {
      const dt = 1 / 60;
      const displacement = this.value - this.target;
      const springForce = -this.stiffness * displacement;
      const dampingForce = -this.damping * this.velocity;
      const acceleration = (springForce + dampingForce) / this.mass;
      this.velocity += acceleration * dt;
      this.value += this.velocity * dt;

      if (this._onUpdate) this._onUpdate(this.value);

      const settled = Math.abs(this.target - this.value) < 0.002 && Math.abs(this.velocity) < 0.002;
      if (settled) {
        this.value = this.target;
        if (this._onUpdate) this._onUpdate(this.value);
        this._rafId = null;
      } else {
        this._rafId = requestAnimationFrame(this._step);
      }
    }
  }

  // ==================================================================
  // 5. UTILITIES
  // ==================================================================
  function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
  }

  function formatTime(timestamp) {
    const d = new Date(timestamp);
    const hh = String(d.getHours()).padStart(2, '0');
    const mm = String(d.getMinutes()).padStart(2, '0');
    return hh + ':' + mm;
  }

  // A small, dependency-free string hash — used to deterministically
  // pick the same avatar gradient and the same "grouping" identity
  // for a given username every time.
  function hashString(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
      hash = (hash << 5) - hash + str.charCodeAt(i);
      hash |= 0;
    }
    return Math.abs(hash);
  }

  function debounce(fn, wait) {
    let t = null;
    return function (...args) {
      clearTimeout(t);
      t = setTimeout(() => fn.apply(this, args), wait);
    };
  }

  // ==================================================================
  // 6. USERNAME MANAGEMENT
  // ==================================================================
  // No accounts, no passwords — just a name kept in localStorage on
  // this device. This section is the ONLY place that reads/writes
  // the username, so it's the place to look if you ever want to
  // change how identity works (e.g. swap in real Firebase Auth).
  function loadStoredUsername() {
    try {
      return localStorage.getItem(CONFIG.storageKeyUsername);
    } catch (e) {
      // localStorage can throw in locked-down/private contexts —
      // fail soft and just ask for a name every time instead of crashing.
      return null;
    }
  }

  function saveUsername(name) {
    state.username = name;
    try {
      localStorage.setItem(CONFIG.storageKeyUsername, name);
    } catch (e) {
      /* see note above — non-fatal if storage is unavailable */
    }
    renderUserPill(name);
  }

  function renderUserPill(name) {
    userNameLabelEl.textContent = name;
    userAvatarEl.textContent = name.trim().charAt(0).toUpperCase() || '?';
    const [c1, c2] = colorsForName(name);
    userAvatarEl.style.background = 'linear-gradient(135deg, ' + c1 + ', ' + c2 + ')';
  }

  function openNameVeil(prefill) {
    nameInputEl.value = prefill || '';
    nameErrorEl.textContent = '';
    nameSubmitLabel.textContent = prefill ? 'Save name' : 'Enter the room';
    nameVeilEl.classList.add('is-visible');
    // focus after the entrance transition has visibly started, not before —
    // jumping focus instantly can fight with the card's own scale-in.
    setTimeout(() => nameInputEl.focus(), 120);
  }

  function closeNameVeil() {
    nameVeilEl.classList.remove('is-visible');
  }

  nameFormEl.addEventListener('submit', (event) => {
    event.preventDefault();
    const value = nameInputEl.value.trim().replace(/\s+/g, ' ');
    if (!value) {
      nameErrorEl.textContent = 'Type a name to continue.';
      // a little "shake" via the spring-flavoured CSS transition already
      // on the input: nudge it through a quick scale dip.
      nameInputEl.style.transform = 'scale(0.97)';
      requestAnimationFrame(() => { nameInputEl.style.transform = ''; });
      return;
    }
    const isFirstTime = !state.username;
    saveUsername(value);
    closeNameVeil();
    if (isFirstTime) {
      revealApp();
    }
  });

  userPillEl.addEventListener('click', () => {
    openNameVeil(state.username);
  });

  // ==================================================================
  // 7. AVATAR COLORS
  // ==================================================================
  // A small curated set of gradient pairs, all drawn from the same
  // family as the app's two-tone accent, so every avatar feels like
  // it belongs to the same room instead of a random rainbow.
  const AVATAR_GRADIENTS = [
    ['#8a7bff', '#caa6ff'],
    ['#2bb3a3', '#7fe0d2'],
    ['#e8a86c', '#f4cf9e'],
    ['#d98bb0', '#f3b8d6'],
    ['#5b7fff', '#8ad1ff'],
    ['#ff9a8a', '#ffd1a8'],
  ];
  function colorsForName(name) {
    const index = hashString(name || '?') % AVATAR_GRADIENTS.length;
    return AVATAR_GRADIENTS[index];
  }

  // ==================================================================
  // 8. AMBIENT BACKGROUND — particles + cursor parallax
  // ==================================================================
  // Two purely visual effects, both skipped entirely when the user
  // has asked the OS for reduced motion.
  function spawnParticles() {
    if (prefersReducedMotion) return;
    const count = 16;
    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = 2 + Math.random() * 3;
      const left = Math.random() * 100;
      const duration = 18 + Math.random() * 16;
      const delay = -Math.random() * duration; // negative delay = stagger start points
      const drift = (Math.random() - 0.5) * 60;
      const peak = 0.25 + Math.random() * 0.3;
      p.style.setProperty('--size', size + 'px');
      p.style.left = left + '%';
      p.style.setProperty('--dur', duration + 's');
      p.style.setProperty('--delay', delay + 's');
      p.style.setProperty('--drift', drift + 'px');
      p.style.setProperty('--peak', peak);
      particlesHostEl.appendChild(p);
    }
  }

  // Very small parallax: the background blobs and any element with
  // `.glass-reactive` shift a few pixels toward the cursor. Throttled
  // to one update per animation frame so it never costs more than a
  // normal scroll.
  function initCursorParallax() {
    if (prefersReducedMotion) return;
    let scheduled = false;
    let lastX = 0.5, lastY = 0.5;

    window.addEventListener('mousemove', (event) => {
      lastX = event.clientX / window.innerWidth;
      lastY = event.clientY / window.innerHeight;
      if (!scheduled) {
        scheduled = true;
        requestAnimationFrame(() => {
          const nx = (lastX - 0.5) * 2; // -1..1
          const ny = (lastY - 0.5) * 2;
          document.documentElement.style.setProperty('--mx', nx.toFixed(3));
          document.documentElement.style.setProperty('--my', ny.toFixed(3));
          scheduled = false;
        });
      }
    });

    // glass-reactive panels also track the cursor locally, to light up
    // a soft highlight right under the pointer.
    document.querySelectorAll('.glass-reactive').forEach((panel) => {
      panel.addEventListener('mousemove', (event) => {
        const rect = panel.getBoundingClientRect();
        const gx = ((event.clientX - rect.left) / rect.width) * 100;
        const gy = ((event.clientY - rect.top) / rect.height) * 100;
        panel.style.setProperty('--gx', gx + '%');
        panel.style.setProperty('--gy', gy + '%');
        panel.style.setProperty('--glow-opacity', '1');
      });
      panel.addEventListener('mouseleave', () => {
        panel.style.setProperty('--glow-opacity', '0');
      });
    });
  }

  // ==================================================================
  // 9. CHAT RENDERING
  // ==================================================================
  // This section turns a plain message object —
  //   { username: string, text: string, timestamp: number }
  // — into the floating glass card you see on screen, and animates
  // it into place with a real spring (see section 4). It is also the
  // ONLY place that writes message content into the DOM, and it does
  // so with textContent (never innerHTML) so that nothing a person
  // types — including HTML or script-like text — can ever execute.
  // That matters even in a "friends only" room: a pasted link or a
  // stray "<img onerror=...>" should just be inert text, never code.
  function renderMessage(message, options = {}) {
    const isOwn = message.username === state.username;
    const minutesSinceLast = (message.timestamp - state.lastRenderedTime) / 60000;
    const isGrouped =
      message.username === state.lastRenderedUsername &&
      minutesSinceLast >= 0 &&
      minutesSinceLast < CONFIG.groupWindowMinutes;

    const row = document.createElement('div');
    row.className = 'message-row' + (isOwn ? ' is-own' : '') + (isGrouped ? ' is-grouped' : '');

    const avatar = document.createElement('div');
    avatar.className = 'message-avatar';
    avatar.textContent = message.username.trim().charAt(0).toUpperCase() || '?';
    const [c1, c2] = colorsForName(message.username);
    avatar.style.background = 'linear-gradient(135deg, ' + c1 + ', ' + c2 + ')';

    const body = document.createElement('div');
    body.className = 'message-body';

    const meta = document.createElement('div');
    meta.className = 'message-meta';
    const nameEl = document.createElement('span');
    nameEl.className = 'message-name';
    nameEl.textContent = message.username;
    const timeEl = document.createElement('span');
    timeEl.className = 'message-time';
    timeEl.textContent = formatTime(message.timestamp);
    meta.appendChild(nameEl);
    meta.appendChild(timeEl);

    const card = document.createElement('div');
    card.className = 'message-card';
    card.textContent = message.text; // textContent, not innerHTML — see comment above

    const inlineTime = document.createElement('span');
    inlineTime.className = 'message-time-inline';
    inlineTime.textContent = formatTime(message.timestamp);
    card.appendChild(inlineTime);

    body.appendChild(meta);
    body.appendChild(card);
    row.appendChild(avatar);
    row.appendChild(body);

    // Entrance: a real spring drives translateY + scale + opacity from
    // a single progress value. Because the spring is under-damped it
    // overshoots p > 1 briefly — that's the natural little "pop" as
    // each message settles into the conversation, not a hand-tuned
    // keyframe.
    row.style.opacity = '0';
    chatLogEl.appendChild(row);

    if (!prefersReducedMotion) {
      const spring = new Spring(0, { stiffness: 230, damping: 19, mass: 1 });
      spring.to(1, (p) => {
        const translateY = (1 - p) * 22;
        const scale = 0.94 + p * 0.06;
        row.style.opacity = String(clamp(p, 0, 1));
        row.style.transform = 'translateY(' + translateY + 'px) scale(' + scale + ')';
      });
    } else {
      row.style.opacity = '1';
    }

    state.lastRenderedUsername = message.username;
    state.lastRenderedTime = message.timestamp;

    emptyStateEl.style.display = 'none';

    const shouldAutoScroll = isOwn || state.isUserNearBottom || options.forceScroll;
    if (shouldAutoScroll) {
      scrollChatToBottom();
    } else {
      state.unseenCount += 1;
      updateJumpLatest();
    }
  }

  function scrollChatToBottom() {
    chatLogEl.scrollTo({ top: chatLogEl.scrollHeight, behavior: 'smooth' });
    state.unseenCount = 0;
    updateJumpLatest();
  }

  function updateJumpLatest() {
    jumpLatestEl.classList.toggle('is-visible', state.unseenCount > 0 && !state.isUserNearBottom);
    const label = jumpLatestEl.querySelector('span');
    label.textContent = state.unseenCount > 1 ? state.unseenCount + ' new messages' : 'New messages';
  }

  chatLogEl.addEventListener('scroll', debounce(() => {
    const distanceFromBottom = chatLogEl.scrollHeight - chatLogEl.scrollTop - chatLogEl.clientHeight;
    state.isUserNearBottom = distanceFromBottom < CONFIG.autoScrollThreshold;
    if (state.isUserNearBottom) {
      state.unseenCount = 0;
      updateJumpLatest();
    }
  }, 80));

  jumpLatestEl.addEventListener('click', scrollChatToBottom);

  // ==================================================================
  // 10. FIREBASE HOOKS  ← this is the section you'll edit
  // ==================================================================
  //
  // FIREBASE INITIALIZATION
  // ------------------------------------------------------------------
  // Paste your config from the Firebase console below, then:
  //   1. Uncomment the two <script src="...firebasejs..."> tags in <head>.
  //   2. Uncomment the three lines below (firebaseConfig, initializeApp, db).
  //
  // const firebaseConfig = {
  //   apiKey: "YOUR_API_KEY",
  //   authDomain: "YOUR_PROJECT.firebaseapp.com",
  //   databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
  //   projectId: "YOUR_PROJECT",
  //   storageBucket: "YOUR_PROJECT.appspot.com",
  //   messagingSenderId: "YOUR_SENDER_ID",
  //   appId: "YOUR_APP_ID"
  // };
  // firebase.initializeApp(firebaseConfig);
  // const db = firebase.database();
  //
  // Messages are stored as a flat, ever-growing list at the path
  // "/messages", where each child looks like:
  //   { username: "Maya", text: "hey!", timestamp: 1719500000000 }
  // Usernames are NOT stored in Firebase at all — each browser keeps
  // its own name locally (see section 6), and simply tags every
  // message it sends with that name.
  //
  // ------------------------------------------------------------------
  // LOCAL DEMO BACKEND (active by default)
  // ------------------------------------------------------------------
  // Until you wire up Firebase above, A·chat runs on this tiny local
  // stand-in so the app is fully usable right away: messages persist
  // in localStorage, and BroadcastChannel mirrors them live to any
  // other tab open on this same page — open two tabs to see it work.
      const firebaseConfig = {
    apiKey: "AIzaSyA4Jm9a3Vr8d5bwz2G3Ru4ZJiZ4Oc783YQ",
    authDomain: "a-chat-fbb2a.firebaseapp.com",
    projectId: "a-chat-fbb2a",
    storageBucket: "a-chat-fbb2a.firebasestorage.app",
    messagingSenderId: "635087475472",
    appId: "1:635087475472:web:522929dc7e4dea0b7c0b95"
  };
  const LocalDemoBackend = (function () {
    let channel = null;

    function readHistory() {
      try {
        const raw = localStorage.getItem(CONFIG.storageKeyDemoMessages);
        return raw ? JSON.parse(raw) : [];
      } catch (e) {
        return [];
      }
    }
    function writeHistory(list) {
      try {
        localStorage.setItem(CONFIG.storageKeyDemoMessages, JSON.stringify(list.slice(-CONFIG.maxHistory)));
      } catch (e) {
        /* storage full or unavailable — the room still works for this session */
      }
    }

    return {
      // RECEIVING happens here: replay anything already saved, then
      // keep listening for messages broadcast from other tabs.
      init(onMessage) {
        readHistory().forEach((msg) => onMessage(msg));
        if ('BroadcastChannel' in window) {
          channel = new BroadcastChannel('achat-demo-room');
          channel.onmessage = (event) => onMessage(event.data);
        }
      },
      // SENDING happens here: append to local history and broadcast
      // to any other open tab. (BroadcastChannel never echoes back to
      // the tab that sent it, so the sender relies on the immediate
      // local render in section 11 instead — no duplicate message.)
      send(message) {
        const history = readHistory();
        history.push(message);
        writeHistory(history);
        if (channel) channel.postMessage(message);
      },
    };
  })();

  // LISTENING happens here: ChatBackend is the one seam the rest of
  // the app talks to. Swap its two methods to move from the local
  // demo to real Firebase without touching anything else in the file.
  const ChatBackend = {
    init(onMessage) {
      //LocalDemoBackend.init(onMessage);
      // ---- FIREBASE VERSION ----
      // Comment out the line above and uncomment this one. Note that
      // with real Firebase you should ALSO remove the immediate local
      // render in section 11 (handleSend), because 'child_added' fires
      // for your own pushes too — keeping both would show your own
      // message twice.
      db.ref('messages').limitToLast(CONFIG.maxHistory).on('child_added', (snapshot) => {
      onMessage(snapshot.val());
     });
    },
    send(message) {
      //LocalDemoBackend.send(message);
      // ---- FIREBASE VERSION ----
       db.ref('messages').push(message);
    },
  };

  // ==================================================================
  // 11. MESSAGE SENDING
  // ==================================================================
  function handleSend() {
    const text = messageInputEl.value.trim();
    if (!text || !state.username) return;

    const message = {
      username: state.username,
      text: text,
      timestamp: Date.now(),
    };

    // Immediate local echo — the sender always sees their own message
    // appear instantly, with no round trip. (Read the Firebase note in
    // section 10 before relying on this once a real backend is wired up.)
    //renderMessage(message, { forceScroll: true });
    ChatBackend.send(message);

    messageInputEl.value = '';
    autosizeComposer();
    updateSendButtonState();
    messageInputEl.focus();
  }

  composerFormEl.addEventListener('submit', (event) => {
    event.preventDefault();
    triggerSendRipple();
    handleSend();
  });

  messageInputEl.addEventListener('keydown', (event) => {
    if (event.key === 'Enter' && !event.shiftKey) {
      event.preventDefault();
      if (!sendButtonEl.disabled) {
        triggerSendRipple();
        handleSend();
      }
    }
  });

  // The send orb's "compress then bounce back" press feedback, driven
  // by a real spring rather than a CSS keyframe, plus a one-shot
  // ripple. Pointer (not click) events so it feels immediate on touch.
  const sendOrbSpring = new Spring(1, { stiffness: 380, damping: 16 });
  function applySendOrbScale(value) {
    sendButtonEl.style.transform = 'scale(' + value + ')';
  }
  sendButtonEl.addEventListener('pointerdown', () => {
    if (sendButtonEl.disabled) return;
    sendOrbSpring.to(0.88, applySendOrbScale);
  });
  ['pointerup', 'pointerleave', 'pointercancel'].forEach((type) => {
    sendButtonEl.addEventListener(type, () => {
      sendOrbSpring.to(1, applySendOrbScale);
    });
  });
  function triggerSendRipple() {
    sendButtonEl.classList.remove('is-rippling');
    // forcing a reflow lets the ripple animation restart on rapid sends
    void sendButtonEl.offsetWidth;
    sendButtonEl.classList.add('is-rippling');
  }

  function updateSendButtonState() {
    sendButtonEl.disabled = messageInputEl.value.trim().length === 0;
  }

  // ==================================================================
  // 12. COMPOSER BEHAVIOUR — autosize + placeholder typewriter
  // ==================================================================
  function autosizeComposer() {
    messageInputEl.style.height = 'auto';
    const next = Math.min(messageInputEl.scrollHeight, 140);
    messageInputEl.style.height = next + 'px';
  }
  messageInputEl.addEventListener('input', () => {
    autosizeComposer();
    updateSendButtonState();
  });

  // A gentle typewriter effect in the placeholder, only while the
  // field is empty and unfocused — a small sign of life on an
  // otherwise idle composer. Pauses itself rather than fighting the
  // user the moment they focus or type.
  let placeholderTimer = null;
  function runPlaceholderTypewriter() {
    if (prefersReducedMotion) {
      messageInputEl.placeholder = PLACEHOLDER_PHRASES[0];
      return;
    }
    let phraseIndex = 0;
    let charIndex = 0;
    let deleting = false;

    function tick() {
      const idle = document.activeElement !== messageInputEl && messageInputEl.value.length === 0;
      if (!idle) {
        placeholderTimer = setTimeout(tick, 350);
        return;
      }
      const phrase = PLACEHOLDER_PHRASES[phraseIndex];
      if (!deleting) {
        charIndex++;
        messageInputEl.placeholder = phrase.slice(0, charIndex);
        if (charIndex === phrase.length) {
          deleting = true;
          placeholderTimer = setTimeout(tick, 1700);
          return;
        }
        placeholderTimer = setTimeout(tick, 55);
      } else {
        charIndex--;
        messageInputEl.placeholder = phrase.slice(0, charIndex);
        if (charIndex === 0) {
          deleting = false;
          phraseIndex = (phraseIndex + 1) % PLACEHOLDER_PHRASES.length;
        }
        placeholderTimer = setTimeout(tick, 28);
      }
    }
    tick();
  }

  // ==================================================================
  // 13. EVENT LISTENERS (misc / global)
  // ==================================================================
  window.addEventListener('beforeunload', () => {
    if (placeholderTimer) clearTimeout(placeholderTimer);
  });

  // ==================================================================
  // 14. BOOT SEQUENCE
  // ==================================================================
  // splash → (name veil, first run only) → reveal app shell → connect
  // to the chat backend. Kept strictly sequential so the backend is
  // never asked to render messages before we know whose messages are
  // "ours" to style differently.
  function revealApp() {
    appEl.classList.add('is-ready');
    backendLabelEl.textContent = 'BroadcastChannel' in window ? 'live room' : 'local room';
    ChatBackend.init((message) => {
      renderMessage(message, { forceScroll: false });
    });
    updateSendButtonState();
  }

  function finishBoot() {
    const stored = loadStoredUsername();
    splashEl.classList.add('is-leaving');
    setTimeout(() => {
      splashEl.style.display = 'none';
      if (stored) {
        saveUsername(stored);
        revealApp();
      } else {
        openNameVeil();
      }
    }, 550);
  }

  window.addEventListener('DOMContentLoaded', () => {
    spawnParticles();
    initCursorParallax();
    runPlaceholderTypewriter();
    autosizeComposer();
    updateSendButtonState();
    setTimeout(finishBoot, CONFIG.splashMinMs);
  });
  </script>
